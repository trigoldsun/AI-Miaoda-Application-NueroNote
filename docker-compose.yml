# NueroNote Docker Compose 配置
# 用于开发、测试和生产环境

services:
  # =======================================================================
  # NueroNote 应用服务
  # =======================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-development}
    container_name: nueronote_app
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      # Flask配置
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      
      # 安全配置（生产环境必须修改）
      - FLUX_SECRET_KEY=${FLUX_SECRET_KEY:-change_me_in_production}
      - FLUX_JWT_SECRET=${FLUX_JWT_SECRET:-change_jwt_secret_in_production}
      
      # 数据库配置
      - FLUX_DB=/data/nueronote.db
      - DATABASE_TYPE=${DATABASE_TYPE:-sqlite}
      - DATABASE_URL=${DATABASE_URL:-}
      
      # Redis配置
      - REDIS_ENABLED=${REDIS_ENABLED:-false}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      
      # CORS配置
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      
    volumes:
      # 持久化数据库
      - nueronote_data:/data
      # 持久化日志
      - nueronote_logs:/app/logs
    depends_on:
      - redis
    networks:
      - nueronote_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =======================================================================
  # Redis 缓存服务
  # =======================================================================
  redis:
    image: redis:7-alpine
    container_name: nueronote_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - nueronote_network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =======================================================================
  # PostgreSQL 数据库（生产推荐）
  # =======================================================================
  postgres:
    image: postgres:16-alpine
    container_name: nueronote_postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=nueronote
      - POSTGRES_USER=${POSTGRES_USER:-nueronote}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nueronote_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nueronote}"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =======================================================================
  # Nginx 反向代理（生产推荐）
  # =======================================================================
  nginx:
    image: nginx:alpine
    container_name: nueronote_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - nueronote_network
    restart: unless-stopped
    profiles:
      - production

# =============================================================================
# 网络配置
# =============================================================================
networks:
  nueronote_network:
    driver: bridge

# =============================================================================
# 持久化卷
# =============================================================================
volumes:
  nueronote_data:
    driver: local
  nueronote_logs:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  nginx_logs:
    driver: local
