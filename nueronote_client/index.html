<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NueroNote</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#fff;--border:#e4e2dc;
  --text:#1a1918;--muted:#8a8580;--accent:#2563eb;
  --accent2:#7c3aed;--tag-bg:#f3f0ff;--tag-text:#6d28d9;
  --code-bg:#1e1e1e;--code-text:#d4d4d4;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
.dark{--bg:#111110;--surface:#1c1b1a;--border:#2e2d2b;--text:#f5f4f2;--muted:#8a8580;--accent:#60a5fa;--accent2:#a78bfa;--tag-bg:#2e1065;--tag-text:#c4b5fd}
html,body{height:100%;background:var(--bg);color:var(--text);font:15px system-ui,sans-serif}
button{font:inherit;cursor:pointer;border:none;border-radius:6px;padding:.4em .8em;transition:all .15s}
button.primary{background:var(--accent);color:#fff}
button:hover{opacity:.88}
input,textarea{font:inherit;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.5em .7em;color:var(--text);resize:none}
input:focus,textarea:focus{outline:2px solid var(--accent)}
.hidden{display:none!important}
a{color:var(--accent)}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh}
header{display:flex;align-items:center;gap:.5em;padding:.5em 1em;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.logo{font-weight:700;font-size:1.1em;color:var(--accent);flex:1}
.icon-btn{background:none;color:var(--muted);padding:.4em;font-size:1.1em;border-radius:6px}
.icon-btn:hover{color:var(--text);background:var(--bg)}
#sidebar{width:200px;flex-shrink:0;border-right:1px solid var(--border);overflow:auto;background:var(--surface);padding:.5em;font-size:.9em}
.doc-item{padding:.35em .7em;border-radius:5px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-item:hover{background:var(--bg)}
.doc-item.active{background:var(--accent);color:#fff}
#editor{flex:1;overflow:auto;padding:2em 3em}
#doc-title{font-size:1.8em;font-weight:700;border:none;background:transparent;width:100%;padding:0 0 .3em;margin-bottom:.5em;color:var(--text);border-bottom:2px solid var(--border)}
#doc-title:focus{outline:none;border-bottom-color:var(--accent)}

/* ── Blocks ── */
.block{position:relative;padding:.15em 0 .15em 1.5em;cursor:text;min-height:1.6em;line-height:1.7;border-radius:4px}
.block:hover{background:rgba(37,99,235,.03)}
.block:focus-within{background:rgba(37,99,235,.05)}
.drag{position:absolute;left:.2em;top:50%;transform:translateY(-50%);color:var(--border);cursor:grab;font-size:.8em;opacity:0;transition:opacity .1s}
.block:hover .drag{opacity:1}
.content{min-width:3em;outline:none;white-space:pre-wrap;word-break:break-word;display:inline;width:100%}
.content:empty::before{content:attr(data-placeholder);color:var(--muted);font-style:italic;pointer-events:none}
.block.h1 .content,.block.h2 .content,.block.h3 .content{display:block;font-weight:700}
.block.h1 .content{font-size:1.5em}
.block.h2 .content{font-size:1.25em;font-weight:600}
.block.h3 .content{font-size:1.1em;font-weight:600}
.block.code .content{background:var(--code-bg);color:var(--code-text);padding:.8em 1em;border-radius:6px;display:block;font-family:monospace;font-size:.88em;overflow:auto}
.block.quote .content{border-left:3px solid var(--accent);padding-left:1em;color:var(--muted);font-style:italic;display:block}
.block.callout .content{background:rgba(37,99,235,.06);border-left:3px solid var(--accent);padding:.5em 1em;border-radius:0 6px 6px 0;display:block}
.block .content a{color:var(--accent);text-decoration:underline}

/* ── Search ── */
#search-modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-start;justify-content:center;padding-top:15vh;z-index:200}
#search-box{background:var(--surface);border-radius:8px;width:min(560px,92vw);box-shadow:0 25px 50px rgba(0,0,0,.25)}
#search-input{width:100%;border:none;border-bottom:1px solid var(--border);border-radius:8px 8px 0 0;padding:.8em 1em;font-size:1.1em}
#search-input:focus{outline:none}
#search-results{max-height:380px;overflow:auto}
.result{padding:.6em 1em;cursor:pointer;border-bottom:1px solid var(--border)}
.result:hover,.result.active{background:var(--accent);color:#fff}
.result:last-child{border-bottom:none}
.result .title{font-weight:600}
.result .snippet{font-size:.85em;color:var(--muted);margin-top:.2em}
.result:hover .snippet{color:rgba(255,255,255,.7)}
.search-empty{padding:1em;text-align:center;color:var(--muted)}
.search-hint{padding:.4em 1em;font-size:.8em;color:var(--muted)}

/* ── Auth ── */
#auth-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)}
.auth-card{background:var(--surface);padding:2em;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.1);width:min(380px,92vw)}
.auth-card h1{font-size:1.5em;margin-bottom:.15em}
.auth-card p{color:var(--muted);font-size:.9em;margin-bottom:1.5em}
.auth-card label{display:block;margin-bottom:.8em}
.auth-card label span{display:block;font-size:.8em;margin-bottom:.2em;color:var(--muted)}
.auth-card button{width:100%;padding:.7em;margin-top:.5em;font-size:1em}
.alt{text-align:center;margin-top:1em;font-size:.85em;color:var(--muted)}
.alt a{color:var(--accent);cursor:pointer}

/* ── Toast ── */
#toast{position:fixed;bottom:1.5em;right:1.5em;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.6em 1em;box-shadow:var(--shadow);font-size:.9em;z-index:300;animation:slideUp .2s}
@keyframes slideUp{from{transform:translateY(1em);opacity:0}to{transform:none;opacity:1}}

/* ── Section headers ── */
.section-label{font-size:.7em;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:.5em .7em .3em}

/* ── Backlinks ── */
#backlinks{background:var(--bg);border-top:1px solid var(--border);padding:.8em 1em;font-size:.85em;color:var(--muted)}
#backlinks h4{font-size:.75em;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4em}
.bl-item{padding:.2em 0}
.bl-item a{color:var(--accent);cursor:pointer;text-decoration:underline}

/* ── Empty state ── */
.empty-state{text-align:center;padding:3em;color:var(--muted)}

/* ── Knowledge Graph ── */
#graph-modal{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column}
#graph-header{display:flex;align-items:center;padding:.5em 1em;border-bottom:1px solid var(--border);background:var(--surface);gap:.5em}
#graph-header h2{font-size:1em;font-weight:600;flex:1}
#graph-canvas{flex:1;overflow:hidden;background:var(--bg)}
#graph-tooltip{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.5em .8em;font-size:.85em;pointer-events:none;box-shadow:var(--shadow);z-index:510;max-width:250px;display:none}
#graph-tooltip .title{font-weight:600;margin-bottom:.3em}
#graph-tooltip .links{color:var(--muted);font-size:.8em}
#graph-legend{position:absolute;bottom:1em;left:1em;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.6em 1em;font-size:.8em}
#graph-legend .legend-item{display:flex;align-items:center;gap:.4em;margin:.2em 0}
#graph-legend .dot{width:10px;height:10px;border-radius:50%}
#graph-legend .dot.doc{background:var(--accent)}
#graph-legend .dot.active{background:var(--accent2)}
#graph-legend .dot.isolated{background:var(--muted)}
#graph-minimap{position:absolute;bottom:1em;right:1em;width:150px;height:100px;background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;opacity:.9}
#graph-minimap canvas{width:100%;height:100%}
</style>
</head>
<body>
<div id="app">
  <div id="auth-screen"></div>
  <div id="main-app" class="hidden" style="display:flex;flex-direction:column;height:100vh">
    <header>
      <div class="logo">NueroNote</div>
      <span id="user-info" style="font-size:.8em;color:var(--muted);margin-right:auto"></span>
      <button class="icon-btn" id="btn-graph" title="知识图谱">&#9673;</button>
      <button class="icon-btn" id="btn-theme" title="切换主题">&#968;</button>
      <button class="icon-btn" id="btn-search" title="搜索 (Ctrl+Shift+F)">&#8984;</button>
      <button class="icon-btn" id="btn-new" title="新建 (Ctrl+N)">+</button>
    </header>
    <div style="display:flex;flex:1;overflow:hidden">
      <nav id="sidebar">
        <div class="section-label">&#128196; 文档</div>
        <div id="doc-list"></div>
        <div class="section-label" style="margin-top:.5em">&#128197; 每日笔记</div>
        <div id="daily-list"></div>
      </nav>
      <main id="editor">
        <div id="empty-state" class="empty-state">
          选择一篇笔记或 <a href="#" onclick="newDoc();return false">新建文档</a>
          &nbsp;&middot;&nbsp; <a href="#" onclick="openDaily();return false">今日日记 (Ctrl+D)</a>
          &nbsp;&middot;&nbsp; <a href="#" onclick="openGraph();return false">知识图谱</a>
        </div>
        <div id="editor-inner" class="hidden">
          <input id="doc-title" placeholder="无标题" autocomplete="off" spellcheck="false">
          <div id="blocks-container"></div>
        </div>
      </main>
    </div>
    <div id="backlinks" class="hidden">
      <h4>&#128279; 反链</h4>
      <div id="backlink-items"></div>
    </div>
  </div>
</div>

<div id="search-modal" class="hidden">
  <div id="search-box">
    <input id="search-input" placeholder="搜索文档标题和内容..." autofocus autocomplete="off">
    <div id="search-results"><div class="search-empty">输入关键词搜索...</div></div>
    <div class="search-hint">Esc 关闭 &nbsp;|&nbsp; Enter 打开 &nbsp;|&nbsp; &#8593;&#8595; 导航</div>
  </div>
</div>

<!-- Knowledge Graph Modal -->
<div id="graph-modal" class="hidden">
  <div id="graph-header">
    <h2>&#9673; 知识图谱</h2>
    <button id="btn-graph-close" class="icon-btn">&#10005;</button>
  </div>
  <div id="graph-canvas"></div>
  <div id="graph-tooltip">
    <div class="title"></div>
    <div class="links"></div>
  </div>
  <div id="graph-legend">
    <div class="legend-item"><span class="dot doc"></span> 文档</div>
    <div class="legend-item"><span class="dot active"></span> 当前文档</div>
    <div class="legend-item"><span class="dot isolated"></span> 孤立文档</div>
  </div>
</div>

<div id="toast" class="hidden"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(function() {
'use strict';
var API = '/api/v1';

// ─── State ─────────────────────────────────────────────────────────
var vault = null;
var token = null;
var userId = null;
var currentDocId = null;
var dark = false;
var editingBlockId = null;
var searchIdx = 0;
var searchResults = [];
var saveTimer = null;
var passwordCache = null;

// ─── Knowledge Graph ────────────────────────────────────────────────
var graphSimulation = null;
var graphSvg = null;
var graphZoom = null;

function buildGraphData() {
  if (!vault || !vault._data) return {nodes: [], links: []};
  
  var docs = vault._data.documents;
  var blocks = vault._data.blocks;
  var nodesMap = {};
  var linksMap = {};
  var titleToDocId = {};
  
  // Build title lookup
  for (var id in docs) {
    var doc = docs[id];
    if (doc.title) {
      titleToDocId[doc.title.toLowerCase()] = id;
    }
  }
  
  // Create nodes for all docs
  for (var id in docs) {
    var doc = docs[id];
    nodesMap[id] = {
      id: id,
      title: doc.title || '无标题',
      linkCount: 0,
      backlinkCount: 0,
      isActive: id === currentDocId,
      isIsolated: true
    };
  }
  
  // Scan blocks for wikilinks [[title]]
  var linkRegex = /\[\[([^\]]+)\]\]/g;
  for (var bid in blocks) {
    var block = blocks[bid];
    if (!block.content) continue;
    var match;
    while ((match = linkRegex.exec(block.content)) !== null) {
      var targetTitle = match[1].toLowerCase();
      var targetId = titleToDocId[targetTitle];
      if (targetId && targetId !== block.docId) {
        var linkKey = block.docId + '->' + targetId;
        if (!linksMap[linkKey]) {
          linksMap[linkKey] = {source: block.docId, target: targetId};
          if (nodesMap[block.docId]) nodesMap[block.docId].linkCount++;
          if (nodesMap[targetId]) {
            nodesMap[targetId].linkCount++;
            nodesMap[targetId].isIsolated = false;
            if (nodesMap[block.docId]) nodesMap[block.docId].isIsolated = false;
          }
        }
      }
    }
  }
  
  // Count backlinks
  for (var linkKey in linksMap) {
    var link = linksMap[linkKey];
    if (nodesMap[link.target]) {
      nodesMap[link.target].backlinkCount++;
    }
  }
  
  var nodes = Object.values(nodesMap);
  var links = Object.values(linksMap);
  
  return {nodes: nodes, links: links};
}

function openGraph() {
  $('#graph-modal').classList.remove('hidden');
  renderGraph();
}

function closeGraph() {
  $('#graph-modal').classList.add('hidden');
  if (graphSimulation) {
    graphSimulation.stop();
    graphSimulation = null;
  }
}

function renderGraph() {
  var canvas = $('#graph-canvas');
  canvas.innerHTML = '';
  
  var data = buildGraphData();
  
  if (data.nodes.length === 0) {
    canvas.innerHTML = '<div class="empty-state" style="padding:3em">还没有文档，创建第一篇笔记开始构建知识图谱</div>';
    return;
  }
  
  var width = canvas.clientWidth;
  var height = canvas.clientHeight;
  
  // Create SVG
  var svg = d3.select(canvas)
    .append('svg')
    .attr('width', width)
    .attr('height', height);
  
  graphSvg = svg;
  
  // Define gradients and markers
  var defs = svg.append('defs');
  
  // Arrow marker for links
  defs.append('marker')
    .attr('id', 'arrowhead')
    .attr('viewBox', '-0 -5 10 10')
    .attr('refX', 20)
    .attr('refY', 0)
    .attr('orient', 'auto')
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .append('path')
    .attr('d', 'M 0,-5 L 10,0 L 0,5')
    .attr('fill', dark ? '#666' : '#ccc');
  
  // Zoom behavior
  var zoom = d3.zoom()
    .scaleExtent([0.1, 4])
    .on('zoom', function(event) {
      container.attr('transform', event.transform);
    });
  svg.call(zoom);
  graphZoom = zoom;
  
  // Container for zoom/pan
  var container = svg.append('g');
  
  // Create force simulation
  var simulation = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(data.links).id(function(d) { return d.id; }).distance(100))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(40));
  
  graphSimulation = simulation;
  
  // Draw links
  var link = container.append('g')
    .attr('class', 'links')
    .selectAll('line')
    .data(data.links)
    .enter()
    .append('line')
    .attr('stroke', dark ? '#444' : '#ddd')
    .attr('stroke-width', 1.5)
    .attr('marker-end', 'url(#arrowhead)');
  
  // Draw nodes
  var node = container.append('g')
    .attr('class', 'nodes')
    .selectAll('g')
    .data(data.nodes)
    .enter()
    .append('g')
    .attr('cursor', 'pointer')
    .call(d3.drag()
      .on('start', dragstarted)
      .on('drag', dragged)
      .on('end', dragended));
  
  // Node circles
  node.append('circle')
    .attr('r', function(d) {
      if (d.isActive) return 18;
      if (d.linkCount > 3) return 14;
      if (d.linkCount > 0) return 10;
      return 8;
    })
    .attr('fill', function(d) {
      if (d.isActive) return '#7c3aed';
      if (d.isIsolated) return dark ? '#555' : '#ccc';
      return '#2563eb';
    })
    .attr('stroke', '#fff')
    .attr('stroke-width', 2);
  
  // Node labels
  node.append('text')
    .text(function(d) { return d.title.slice(0, 15) + (d.title.length > 15 ? '...' : ''); })
    .attr('x', 22)
    .attr('y', 4)
    .attr('font-size', '12px')
    .attr('fill', dark ? '#f5f4f2' : '#1a1918');
  
  // Hover effects
  node.on('mouseenter', function(event, d) {
    var tooltip = $('#graph-tooltip');
    tooltip.querySelector('.title').textContent = d.title;
    tooltip.querySelector('.links').textContent = 
      '链接: ' + d.linkCount + ' | 反链: ' + d.backlinkCount;
    tooltip.style.display = 'block';
    tooltip.style.left = (event.pageX + 15) + 'px';
    tooltip.style.top = (event.pageY - 10) + 'px';
    
    d3.select(this).select('circle')
      .transition()
      .duration(150)
      .attr('stroke-width', 4);
  })
  .on('mousemove', function(event) {
    var tooltip = $('#graph-tooltip');
    tooltip.style.left = (event.pageX + 15) + 'px';
    tooltip.style.top = (event.pageY - 10) + 'px';
  })
  .on('mouseleave', function() {
    d3.select(this).select('circle')
      .transition()
      .duration(150)
      .attr('stroke-width', 2);
    $('#graph-tooltip').style.display = 'none';
  })
  .on('click', function(event, d) {
    closeGraph();
    openDoc(d.id);
  });
  
  // Double click to focus
  node.on('dblclick', function(event, d) {
    event.stopPropagation();
    
    // Center view on this node
    svg.transition()
      .duration(750)
      .call(zoom.transform, d3.zoomIdentity
        .translate(width / 2, height / 2)
        .scale(1.5)
        .translate(-width / 2, -height / 2));
  });
  
  // Update positions on tick
  simulation.on('tick', function() {
    link
      .attr('x1', function(d) { return d.source.x; })
      .attr('y1', function(d) { return d.source.y; })
      .attr('x2', function(d) { return d.target.x; })
      .attr('y2', function(d) { return d.target.y; });
    
    node.attr('transform', function(d) {
      d.x = Math.max(30, Math.min(width - 30, d.x));
      d.y = Math.max(30, Math.min(height - 30, d.y));
      return 'translate(' + d.x + ',' + d.y + ')';
    });
  });
  
  function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }
  
  function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  }
  
  function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }
  
  // Stats display
  var stats = canvas.appendChild(document.createElement('div'));
  stats.style.cssText = 'position:absolute;top:.5em;right:.5em;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.4em .8em;font-size:.8em;color:var(--muted)';
  stats.innerHTML = '\u6587\u6863: ' + data.nodes.length + ' | \u94fe\u63a5: ' + data.links.length;
}

// ─── Security: Generate Key Check ────────────────────────────────
// 【更新 v1.1】生成密钥校验值，用于服务端验证密码正确性
function generateKeyCheck(password, saltBase64) {
  var enc = function(s) {
    return btoa(s).replace(/=/g, '');
  };
  var sig = hmac.new(
    password,
    'NueroNote:v1:key-check:' + atob(saltBase64.replace(/_/g, '/')),
    'sha256'
  ).digest();
  return enc(String.fromCharCode.apply(null, new Uint8Array(sig)));
}

// ─── Helpers ───────────────────────────────────────────────────────
function $(s) { return document.querySelector(s); }
function $$(s) { return document.querySelectorAll(s); }

// 【修复 v1.1】HTML转义，防止XSS攻击
function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#x27;');
}

// 兼容旧函数（但推荐使用escHtml）
function esc(s) {
  return escHtml(s);
}

function uid(prefix) {
  var rand = new Uint8Array(12);
  crypto.getRandomValues(rand);
  var b64 = btoa(String.fromCharCode.apply(null, rand)).replace(/[+/=]/g,'_').slice(0,16);
  return prefix ? prefix + '_' + b64 : b64;
}

function toast(msg, dur) {
  var el = $('#toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.classList.add('hidden'); }, dur || 2500);
}

// ─── Client-side Vault ─────────────────────────────────────────────
var SALT_LEN = 16;
var KEY_LEN = 32;
var NONCE_LEN = 12;
var PBKDF2_ITER = 100000;

function vaultDeriveKey(password, saltBytes) {
  return crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
  ).then(function(keyMaterial) {
    return crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:saltBytes, iterations:PBKDF2_ITER, hash:'SHA-256' },
      keyMaterial,
      { name:'AES-GCM', length:256 },
      false,
      ['encrypt','decrypt']
    );
  });
}

function vaultKeyCheck(password, saltBytes) {
  var enc = new TextEncoder();
  return crypto.subtle.importKey('raw', enc.encode(password), {name:'HMAC', hash:'SHA-256'}, false, ['sign'])
    .then(function(key) {
      return crypto.subtle.sign('HMAC', key, enc.encode('NueroNote:v1:key-check'));
    })
    .then(function(sig) {
      return btoa(String.fromCharCode.apply(null, new Uint8Array(sig))).replace(/[+=]/g,'_').slice(0,44);
    });
}

function aesEncrypt(key, plaintext) {
  var nonce = crypto.getRandomValues(new Uint8Array(NONCE_LEN));
  return crypto.subtle.encrypt(
    { name:'AES-GCM', iv:nonce },
    key,
    new TextEncoder().encode(plaintext)
  ).then(function(ct) {
    return {
      nonce: btoa(String.fromCharCode.apply(null, nonce)).replace(/[+=]/g,'_'),
      ciphertext: btoa(String.fromCharCode.apply(null, new Uint8Array(ct))).replace(/[+=]/g,'_'),
    };
  });
}

function aesDecrypt(key, nonceB64, ctB64) {
  var nonce = Uint8Array.from(atob(nonceB64.replace(/_/g,'/')), function(c) { return c.charCodeAt(0); });
  var ct = Uint8Array.from(atob(ctB64.replace(/_/g,'/')), function(c) { return c.charCodeAt(0); });
  return crypto.subtle.decrypt({ name:'AES-GCM', iv:nonce }, key, ct)
    .then(function(pt) { return new TextDecoder().decode(pt); });
}

function createVault(password) {
  var v = {
    _salt: null, _key: null, _vault: null, _data: null,
    _password: password, _ready: false,
  };
  return v;
}

function vaultCreate(v, vaultJson) {
  v._vault = vaultJson;
  v._salt = Uint8Array.from(atob(vaultJson.salt.replace(/_/g,'/')), function(c){return c.charCodeAt(0);});
  v._data = {documents:{}, blocks:{}, daily:{}, flashcards:[], templates:{}, tags:{}};
  v._ready = true;
}

function vaultUnlock(v, password, vaultJson) {
  v._vault = vaultJson;
  var saltBytes = Uint8Array.from(atob(vaultJson.salt.replace(/_/g,'/')), function(c){return c.charCodeAt(0);});
  v._salt = saltBytes;
  v._password = password;

  return vaultDeriveKey(password, saltBytes)
    .then(function(key) {
      v._key = key;
      return vaultKeyCheck(password, saltBytes);
    })
    .then(function(keyCheck) {
      if (keyCheck !== v._vault.check) {
        return Promise.reject(new Error('wrong password'));
      }
      return aesDecrypt(v._key, v._vault.nonce, v._vault.ciphertext);
    })
    .then(function(plaintext) {
      v._data = JSON.parse(plaintext);
      v._ready = true;
      return true;
    })
    .catch(function(err) {
      v._ready = false;
      if (err.message === 'wrong password') return false;
      return Promise.reject(err);
    });
}

function vaultSeal(v) {
  if (!v._ready || !v._key) return Promise.reject(new Error('vault not ready'));
  var plaintext = JSON.stringify(v._data);
  return aesEncrypt(v._key, plaintext)
    .then(function(encData) {
      return vaultKeyCheck(v._password, v._salt)
        .then(function(keyCheck) {
          v._vault = {
            v: 1, alg: 'AES-256-GCM',
            salt: btoa(String.fromCharCode.apply(null, v._salt)).replace(/[+=]/g,'_'),
            nonce: encData.nonce, ciphertext: encData.ciphertext,
            check: keyCheck,
          };
          return v._vault;
        });
    });
}

function vaultCreateDoc(v, title) {
  var id = uid('d');
  var now = Date.now();
  v._data.documents[id] = {id:id, title:title||'无标题', blockIds:[], tags:[], created:now, updated:now};
  return id;
}

function vaultCreateBlock(v, type, content, docId) {
  var id = uid('b');
  var now = Date.now();
  v._data.blocks[id] = {id:id, type:type||'p', content:content||'', attrs:{}, children:[], docId:docId||null, created:now, updated:now};
  return id;
}

function vaultAddBlockToDoc(v, docId, blockId, afterBlockId) {
  var doc = v._data.documents[docId];
  if (!doc) return;
  if (afterBlockId && doc.blockIds.indexOf(afterBlockId) >= 0) {
    var idx = doc.blockIds.indexOf(afterBlockId);
    doc.blockIds.splice(idx + 1, 0, blockId);
  } else {
    doc.blockIds.push(blockId);
  }
  if (v._data.blocks[blockId]) v._data.blocks[blockId].docId = docId;
  doc.updated = Date.now();
}

function vaultGetDoc(v, id) { return v._data.documents[id]; }
function vaultGetBlock(v, id) { return v._data.blocks[id]; }
function vaultSaveBlock(v, id, data) { v._data.blocks[id] = data; }
function vaultSaveDoc(v, id, data) { v._data.documents[id] = data; }

function vaultGetAllDocs(v) {
  return Object.values(v._data.documents).sort(function(a,b){ return b.updated - a.updated; });
}

function vaultGetAllDaily(v) {
  return Object.entries(v._data.daily || {})
    .sort(function(a,b){ return b[0].localeCompare(a[0]); })
    .map(function(d){ return {date:d[0], docId:d[1], doc:v._data.documents[d[1]}; })
    .filter(function(d){ return !!d.doc; });
}

function vaultOpenDaily(v) {
  var d = new Date().toISOString().slice(0,10);
  var daily = v._data.daily || (v._data.daily = {});
  var docId = daily[d];
  if (!docId || !v._data.documents[docId]) {
    docId = vaultCreateDoc(v, '\u2605 ' + d + ' \u65e5\u8bb0');
    daily[d] = docId;
    var bId = vaultCreateBlock(v, 'p', '# \u65e5\u8bb0\n\n\u4e3b\u8981\u5185\u5bb9\n', docId);
    v._data.documents[docId].blockIds = [bId];
  }
  return docId;
}

function vaultSearch(v, q) {
  if (!q || !q.trim()) return [];
  var qL = q.toLowerCase().trim();
  var results = [];
  for (var id in v._data.documents) {
    var doc = v._data.documents[id];
    var titleL = (doc.title || '').toLowerCase();
    if (titleL.indexOf(qL) >= 0) {
      results.push({docId:id, title:doc.title, snippet:'', type:'title', score:10});
      continue;
    }
    var text = vaultDocText(v, doc);
    var idx = text.toLowerCase().indexOf(qL);
    if (idx >= 0) {
      var start = Math.max(0, idx - 30);
      results.push({docId:id, title:doc.title, snippet:text.slice(start, start+80), type:'content', score:1});
    }
  }
  results.sort(function(a,b){ return b.score - a.score; });
  return results.slice(0, 50);
}

function vaultDocText(v, doc) {
  var parts = [doc.title || ''];
  var ids = doc.blockIds || [];
  for (var i = 0; i < ids.length; i++) {
    var b = v._data.blocks[ids[i]];
    if (b) parts.push(b.content || '');
  }
  return parts.join(' ');
}

function vaultGetBacklinks(v, docId) {
  var doc = v._data.documents[docId];
  if (!doc) return [];
  var title = doc.title || '';
  var results = [];
  var seen = {};
  seen[docId] = true;
  for (var bid in v._data.blocks) {
    var block = v._data.blocks[bid];
    if (block.content && block.content.indexOf('[[' + title + ']]') >= 0) {
      var d = v._data.documents[block.docId];
      if (d && !seen[d.id]) {
        seen[d.id] = true;
        results.push({docId:d.id, title:d.title, content:(block.content||'').slice(0,100)});
      }
    }
  }
  return results;
}

function vaultDeleteBlock(v, blockId) {
  var block = v._data.blocks[blockId];
  if (!block) return;
  var docId = block.docId;
  if (docId && v._data.documents[docId]) {
    v._data.documents[docId].blockIds = v._data.documents[docId].blockIds.filter(function(id){ return id !== blockId; });
  }
  delete v._data.blocks[blockId];
}

async function doRegister() {
  var email = $('#auth-email').value.trim();
  var password = $('#auth-password').value;
  if (!email || !password) { toast('\u8bf7\u586b\u5199\u90ae\u7bb1\u548c\u5bc6\u7801'); return; }
  if (password.length < 8) { toast('\u5bc6\u7801\u81f3\u5c11 8 \u4f4d'); return; }
  
  renderLoading('\u6b63\u5728\u521b\u5efa\u8d26\u6237...');
  
  try {
    var resp = await fetch(API + '/auth/register', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email:email, password:password})
    });
    var data = await resp.json();
    
    if (!resp.ok) {
      renderAuth();
      toast(data.error || '\u6ce8\u518c\u5931\u8d25');
      return;
    }
    
    token = data.token;
    userId = data.user_id;
    passwordCache = password;
    localStorage.setItem('flux_token', token);
    localStorage.setItem('flux_uid', userId);
    
    // Create new vault
    vault = createVault(passwordCache);
    vaultCreate(vault, {salt:btoa('salt12bytes!!').replace(/=/g,'_'), check:'placeholder', nonce:'nonce12bytes', ciphertext:'data'});
    
    // Save vault
    var sealed = await vaultSeal(vault);
    await fetch(API + '/vault', {
      method:'PUT',
      headers:{'Content-Type':'application/json','Authorization':'Bearer ' + token},
      body: JSON.stringify({vault:vault._vault, expected_version:0})
    });
    
    showApp();
    toast('\u6b22\u8fce\u4f7f\u7528 NueroNote\uff01');
    
  } catch(err) {
    renderAuth();
    toast('\u7f51\u7edc\u9519\u8bef');
  }
}

async function doLogin() {
  var email = $('#auth-email').value.trim();
  var password = $('#auth-password').value;
  if (!email || !password) { toast('\u8bf7\u586b\u5199\u90ae\u7bb1\u548c\u5bc6\u7801'); return; }
  
  renderLoading('\u6b63\u5728\u89e3\u9501...');
  
  try {
    // 【更新 v1.1】获取用户salt并生成key_check
    var salt = localStorage.getItem('flux_salt');
    if (!salt) {
      // 如果没有salt，先查询用户信息获取salt
      // 这里简化处理，实际需要调用获取salt的API
      salt = 'c2FsdDEyYnl0ZXMh'; // 默认值，实际应该从服务端获取
    }
    var keyCheck = generateKeyCheck(password, salt);
    
    var resp = await fetch(API + '/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email:email, password:password, key_check:keyCheck})
    });
    var data = await resp.json();
    
    if (!resp.ok) {
      renderAuth();
      toast(data.error || '\u767b\u5f55\u5931\u8d25');
      return;
    }
    
    token = data.token;
    userId = data.user_id;
    passwordCache = password;
    localStorage.setItem('flux_token', token);
    localStorage.setItem('flux_uid', userId);
    
    // Load vault
    var vaultResp = await fetch(API + '/vault', {
      headers:{'Authorization':'Bearer ' + token}
    });
    
    if (vaultResp.ok) {
      var vaultData = await vaultResp.json();
      if (vaultData.vault) {
        vault = createVault(passwordCache);
        var unlocked = await vaultUnlock(vault, passwordCache, vaultData.vault);
        if (unlocked) {
          showApp();
          return;
        } else {
          renderAuth();
          toast('\u5bc6\u7801\u9519\u8bef');
          return;
        }
      }
    }
    
    // No vault, create empty one
    vault = createVault(passwordCache);
    vaultCreate(vault, {salt:btoa('salt12bytes!!').replace(/=/g,'_'), check:'placeholder', nonce:'nonce12bytes', ciphertext:'data'});
    showApp();
    
  } catch(err) {
    renderAuth();
    toast('\u7f51\u7edc\u9519\u8bef');
  }
}

async function openDoc(docId) {
  if (currentDocId === docId) return;
  
  currentDocId = docId;
  var doc = vaultGetDoc(vault, docId);
  if (!doc) return;
  
  $('#empty-state').classList.add('hidden');
  $('#editor-inner').classList.remove('hidden');
  
  $('#doc-title').value = doc.title || '';
  
  var container = $('#blocks-container');
  container.innerHTML = '';
  
  var blockIds = doc.blockIds || [];
  for (var i = 0; i < blockIds.length; i++) {
    var block = vaultGetBlock(vault, blockIds[i]);
    if (block) {
      container.appendChild(createBlockEl(block));
    }
  }
  
  // Add empty block if needed
  if (blockIds.length === 0) {
    addNewBlock('p', null);
  }
  
  renderDocList();
  renderDailyList();
  renderBacklinks(docId);
  
  // Update graph if open
  if (!$('#graph-modal').classList.contains('hidden')) {
    renderGraph();
  }
}

function getBlockCls(type) {
  var map = {h1:'h1',h2:'h2',h3:'h3',p:'',code:'code',quote:'quote',callout:'callout',divider:'divider'};
  return 'block ' + (map[type] || '');
}

function getBlockPlaceholder(type) {
  var map = {h1:'\u6807\u98981',h2:'\u6807\u98982',h3:'\u6807\u98983',p:'\u7c7b\u578b/ \u6216 [[ \u5199\u5185\u5bb9',code:'\u4ee3\u7801\u5757',quote:'\u5f15\u7528',callout:'\u63d0\u793a\u6846'};
  return map[type] || '';
}

function createBlockEl(block) {
  var el = document.createElement('div');
  el.className = getBlockCls(block.type);
  el.dataset.id = block.id;
  
  var type = block.type || 'p';
  if (type === 'divider') {
    el.innerHTML = '<hr style="border:none;border-top:1px solid var(--border);margin:1em 0">';
    el.onclick = function() { addNewBlockAfter(block.id, 'p'); };
    return el;
  }
  
  var placeholder = getBlockPlaceholder(type);
  var isHeading = type === 'h1' || type === 'h2' || type === 'h3';
  var displayContent = block.content || '';

  // Render wikilinks 【安全修复 v1.2】HTML转义防止XSS
  displayContent = displayContent.replace(/\[\[([^\]]+)\]\]/g, function(match, title) {
    return '<a href="#" onclick="openByTitle(\\'' + escHtml(title) + '\\');return false" style="color:var(--accent)">[[' + escHtml(title) + ']]</a>';
  });

  el.innerHTML = 
    '<span class="drag" title="\u62d6\u62fd">&#8942;&#8942;</span>' +
    '<' + (isHeading ? 'b' : 'div') + ' class="content"' +
    ' contenteditable="true"' +
    ' data-placeholder="' + placeholder + '"' +
    ' data-type="' + type + '">' + esc(displayContent) + '</' + (isHeading ? 'b' : 'div') + '>';
  
  var contentEl = el.querySelector('.content');
  
  // Show wikilink outline
  if (block.content && block.content.indexOf('[[') >= 0) {
    contentEl.style.outline = '1px dashed var(--accent)';
  }
  
  contentEl.addEventListener('input', function(e) {
    var text = e.target.innerText;
    // Save as plain text but show links
    block.content = text;
    block.updated = Date.now();
    
    // Highlight wikilinks 【安全修复 v1.2】HTML转义防止XSS
    var html = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\[\[([^\]]+)\]\]/g, function(match, title) {
        return '<a href="#" onclick="openByTitle(\\'' + escHtml(title) + '\\');return false" style="color:var(--accent)">[[' + escHtml(title) + ']]</a>';
      });
    var selection = window.getSelection();
    var offset = selection ? selection.focusOffset : text.length;
    e.target.innerHTML = html;
    // Restore cursor
    if (selection) {
      var range = document.createRange();
      var found = false;
      var walker = document.createTreeWalker(e.target, NodeFilter.SHOW_TEXT);
      var currentOffset = 0;
      while (walker.nextNode()) {
        var node = walker.currentNode;
        if (currentOffset + node.length >= offset) {
          range.setStart(node, offset - currentOffset);
          range.collapse(true);
          selection.removeAllRanges();
          selection.addRange(range);
          found = true;
          break;
        }
        currentOffset += node.length;
      }
    }
    
    // Wikilink outline
    e.target.style.outline = text.indexOf('[[') >= 0 ? '1px dashed var(--accent)' : '';
    
    scheduleSave();
  });
  
  contentEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey && contentEl.dataset.type !== 'code') {
      e.preventDefault();
      var blockId = el.dataset.id;
      addNewBlockAfter(blockId, 'p');
    }
    if (e.key === 'Backspace' && contentEl.textContent === '') {
      e.preventDefault();
      deleteCurrentBlock(el.dataset.id);
    }
    if (e.key === '/' && contentEl.textContent === '') {
      e.preventDefault();
      showSlashMenu(el.dataset.id);
    }
  });
  
  contentEl.addEventListener('focus', function() {
    editingBlockId = block.id;
  });
  
  contentEl.addEventListener('blur', function() {
    if (editingBlockId === block.id) editingBlockId = null;
    closeSlashMenu();
  });
  
  // Drag handle
  var dragHandle = el.querySelector('.drag');
  dragHandle.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    e.preventDefault();
    // Simple drag - just set cursor
    el.style.opacity = '0.5';
    var onMove = function(e2) {
      // Visual feedback
    };
    var onUp = function(e2) {
      el.style.opacity = '1';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  
  return el;
}

async function addNewBlockAfter(afterBlockId, type) {
  if (!currentDocId) return;
  var block = vaultGetBlock(vault, afterBlockId);
  if (!block) return;
  
  var id = vaultCreateBlock(vault, type, '', currentDocId);
  vaultAddBlockToDoc(vault, currentDocId, id, afterBlockId);
  
  var newBlock = vaultGetBlock(vault, id);
  var afterEl = document.querySelector('[data-id="' + afterBlockId + '"]');
  if (afterEl && newBlock) {
    var newEl = createBlockEl(newBlock);
    afterEl.after(newEl);
    newEl.querySelector('.content').focus();
  }
  
  scheduleSave();
  return id;
}

function deleteCurrentBlock(blockId) {
  if (!currentDocId) return;
  var block = vaultGetBlock(vault, blockId);
  if (!block) return;
  
  var doc = vaultGetDoc(vault, currentDocId);
  var idx = doc.blockIds.indexOf(blockId);
  
  // Find previous block
  var prevId = idx > 0 ? doc.blockIds[idx - 1] : null;
  
  // Remove element
  var el = document.querySelector('[data-id="' + blockId + '"]');
  if (el) el.remove();
  
  // Delete block
  vaultDeleteBlock(vault, blockId);
  
  // Focus previous
  if (prevId) {
    var prevEl = document.querySelector('[data-id="' + prevId + '"] .content');
    if (prevEl) {
      prevEl.focus();
      // Move cursor to end
      var range = document.createRange();
      range.selectNodeContents(prevEl);
      range.collapse(false);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
    }
  } else {
    // Add empty block
    addNewBlock('p', null);
  }
  
  scheduleSave();
}

function showSlashMenu(blockId) {
  var el = document.querySelector('[data-id="' + blockId + '"]');
  if (!el) return;
  var rect = el.getBoundingClientRect();
  var menu = $('#slash-menu') || createSlashMenu();
  menu.style.left = rect.left + 'px';
  menu.style.top = (rect.bottom + 4) + 'px';
  menu.innerHTML = [
    {type:'h1',label:'\u6807\u98911',hint:'# '},
    {type:'h2',label:'\u6807\u98912',hint:'## '},
    {type:'h3',label:'\u6807\u98913',hint:'### '},
    {type:'p',  label:'\u6b63\u6587',hint:'\u6587\u672c'},
    {type:'code',label:'\u4ee3\u7801\u5757',hint:'\u4ee3\u7801'},
    {type:'quote',label:'\u5f15\u7528',hint:'> '},
    {type:'callout',label:'\u63d0\u793a\u6846',hint:'[!note]'},
    {type:'divider',label:'\u5206\u9694\u7ebf',hint:'---'},
  ].map(function(item, i) {
    return '<div class="slash-item' + (i===0?' active':'') + '" data-type="' + item.type + '">' + item.label + '<span class="slash-hint">' + item.hint + '</span></div>';
  }).join('');
  menu.classList.remove('hidden');
  menu._blockId = blockId;
  menu.querySelectorAll('.slash-item').forEach(function(item) {
    item.onclick = function() {
      var type = item.dataset.type;
      menu.classList.add('hidden');
      if (type === 'divider') { addNewBlockAfter(blockId, 'divider'); return; }
      var block = vaultGetBlock(vault, blockId);
      if (block) {
        block.type = type;
        var blockEl = document.querySelector('[data-id="' + blockId + '"]');
        if (blockEl) blockEl.className = 'block ' + getBlockCls(type);
        var contentEl = blockEl ? blockEl.querySelector('.content') : null;
        if (contentEl) {
          contentEl.dataset.placeholder = getBlockPlaceholder(type);
          contentEl.dataset.type = type;
        }
      }
      scheduleSave();
    };
  });
}

function createSlashMenu() {
  var menu = document.createElement('div');
  menu.id = 'slash-menu';
  menu.style.cssText = 'position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:6px;box-shadow:var(--shadow);min-width:160px;max-height:300px;overflow:auto;z-index:100;font-size:.9em;';
  menu.innerHTML = '<style>.slash-item{padding:.4em .8em;cursor:pointer;border-radius:4px}.slash-item:hover,.slash-item.active{background:var(--accent);color:#fff}.slash-hint{float:right;color:var(--muted);font-size:.8em}.slash-item:hover .slash-hint{color:rgba(255,255,255,.7)}</style>';
  document.body.appendChild(menu);
  menu.addEventListener('mouseleave', function(){ menu.classList.add('hidden'); });
  return menu;
}

function closeSlashMenu() {
  var menu = $('#slash-menu');
  if (menu) menu.classList.add('hidden');
}

async function addNewBlock(type, afterBlockId) {
  if (!currentDocId) return;
  var id = vaultCreateBlock(vault, type, '', currentDocId);
  vaultAddBlockToDoc(vault, currentDocId, id, afterBlockId);
  var block = vaultGetBlock(vault, id);
  if (block) {
    var container = $('#blocks-container');
    var el = createBlockEl(block);
    container.appendChild(el);
    el.querySelector('.content').focus();
  }
  scheduleSave();
  return id;
}

function openByTitle(title) {
  var docs = vaultGetAllDocs(vault);
  var doc = null;
  for (var i = 0; i < docs.length; i++) {
    if (docs[i].title === title) { doc = docs[i]; break; }
  }
  if (doc) { openDoc(doc.id); return; }
  var newId = vaultCreateDoc(vault, title);
  toast('\u5df2\u521b\u5efa: ' + title);
  openDoc(newId);
  renderDocList();
}

function openDaily() {
  var id = vaultOpenDaily(vault);
  openDoc(id);
  renderDailyList();
}

function newDoc() {
  var id = vaultCreateDoc(vault, '');
  openDoc(id);
  renderDocList();
  setTimeout(function() { var t = $('#doc-title'); if (t) t.focus(); }, 50);
}

function renderBacklinks(docId) {
  var links = vaultGetBacklinks(vault, docId);
  var panel = $('#backlinks');
  if (!links || !links.length) { panel.classList.add('hidden'); return; }
  panel.classList.remove('hidden');
  $('#backlink-items').innerHTML = links.map(function(l) {
    return '<div class="bl-item"><a onclick="openDoc(\'' + l.docId + '\')">' + esc(l.title) + '</a>: ' + esc(l.content||'').slice(0,80) + '</div>';
  }).join('');
}

// ─── Title ────────────────────────────────────────────────────────
$('#doc-title').addEventListener('input', function(e) {
  if (!currentDocId) return;
  var doc = vaultGetDoc(vault, currentDocId);
  if (doc) { doc.title = e.target.value; doc.updated = Date.now(); }
  renderDocList();
  scheduleSave();
  // Update graph
  if (!$('#graph-modal').classList.contains('hidden')) {
    renderGraph();
  }
});

// ─── Save ─────────────────────────────────────────────────────────
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveVault, 800);
}

async function saveVault() {
  if (!vault || !token) return;
  try {
    var sealed = await vaultSeal(vault);
    var resp = await fetch(API + '/vault', {
      method:'PUT',
      headers:{'Content-Type':'application/json','Authorization':'Bearer ' + token},
      body: JSON.stringify({vault:vault._vault, expected_version:1})
    });
    if (!resp.ok) {
      if (resp.status === 409) toast('\u7248\u672c\u51b2\u7a81\uff0c\u5df2\u540c\u6b65\u6700\u65b0\u7248\u672c');
    }
  } catch(err) {
    console.error('save error', err);
    toast('\u4fdd\u5b58\u5931\u8d25\uff08\u79bb\u7ebf\u6a21\u5f0f\uff0c\u672c\u5730\u5df2\u4fdd\u5b58\uff09');
  }
}

// ─── Search ───────────────────────────────────────────────────────
function openSearch() {
  $('#search-modal').classList.remove('hidden');
  $('#search-input').value = '';
  $('#search-results').innerHTML = '<div class="search-empty">\u8f93\u5165\u5173\u952e\u8bcd\u641c\u7d22...</div>';
  searchIdx = 0;
  setTimeout(function() { $('#search-input').focus(); }, 50);
}

$('#search-input').addEventListener('input', function(e) {
  var q = e.target.value.trim();
  if (!q) { $('#search-results').innerHTML = '<div class="search-empty">\u8f93\u5165\u5173\u952e\u8bcd\u641c\u7d22...</div>'; searchResults = []; return; }
  var results = vaultSearch(vault, q);
  searchResults = results;
  if (!results.length) {
    $('#search-results').innerHTML = '<div class="search-empty">\u6ca1\u6709\u627e\u5230\u76f8\u5173\u7b14\u8bb0</div>';
    return;
  }
  $('#search-results').innerHTML = results.map(function(r, i) {
    return '<div class="result' + (i===0?' active':'') + '" onclick="pickSearch(' + i + ')"><div class="title">' + esc(r.title) + '</div><div class="snippet">' + esc(r.snippet||'') + '</div></div>';
  }).join('');
  searchIdx = 0;
});

$('#search-input').addEventListener('keydown', function(e) {
  var items = $$('#search-results .result');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    searchIdx = Math.min(searchIdx+1, items.length-1);
    items.forEach(function(it,i){ it.classList.toggle('active', i===searchIdx); });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    searchIdx = Math.max(searchIdx-1, 0);
    items.forEach(function(it,i){ it.classList.toggle('active', i===searchIdx); });
  } else if (e.key === 'Enter') {
    pickSearch(searchIdx);
  } else if (e.key === 'Escape') {
    closeSearch();
  }
});

function pickSearch(idx) {
  var r = searchResults[idx];
  if (!r) return;
  closeSearch();
  openDoc(r.docId);
}

function closeSearch() {
  $('#search-modal').classList.add('hidden');
}

// ─── Toolbar buttons ──────────────────────────────────────────────
$('#btn-theme').addEventListener('click', function() {
  dark = !dark;
  document.body.classList.toggle('dark', dark);
  localStorage.setItem('flux_dark', dark);
});
$('#btn-search').addEventListener('click', openSearch);
$('#btn-new').addEventListener('click', newDoc);
$('#btn-graph').addEventListener('click', openGraph);
$('#btn-graph-close').addEventListener('click', closeGraph);

// ─── Global shortcuts ─────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key === 'F') { e.preventDefault(); openSearch(); return; }
  if ((e.ctrlKey||e.metaKey) && !editingBlockId && e.key === 'n') { e.preventDefault(); newDoc(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key === 'd') { e.preventDefault(); openDaily(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key === 's') { e.preventDefault(); saveVault(); toast('\u5df2\u4fdd\u5b58'); return; }
  if ((e.ctrlKey||e.metaKey) && e.key === 'g') { e.preventDefault(); openGraph(); return; }
  if (e.key === 'Escape') { closeSearch(); closeSlashMenu(); closeGraph(); }
});

// ─── Init ─────────────────────────────────────────────────────────
function init() {
  dark = localStorage.getItem('flux_dark') === 'true';
  if (dark) document.body.classList.add('dark');

  var savedToken = localStorage.getItem('flux_token');
  var savedUid = localStorage.getItem('flux_uid');

  if (!savedToken || !savedUid) {
    renderAuth();
    return;
  }

  renderLoading('\u6b63\u5728\u8fde\u63a5...');
  fetch(API + '/vault', {headers:{'Authorization':'Bearer ' + savedToken}})
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(data) {
      if (data && data.vault) {
        renderLogin();
        $('#auth-password').placeholder = '\u8f93\u5165\u4f60\u7684\u52a0\u5bc6\u5bc6\u94a5\u89e3\u9501\u7b14\u8bb0';
        toast('\u8bf7\u8f93\u5165\u5bc6\u7801\u89e3\u9501');
      } else {
        localStorage.removeItem('flux_token');
        localStorage.removeItem('flux_uid');
        renderAuth();
      }
    })
    .catch(function() { renderAuth(); });
}

init();

window.doRegister = doRegister;
window.doLogin = doLogin;
window.newDoc = newDoc;
window.openDoc = openDoc;
window.openDaily = openDaily;
window.openByTitle = openByTitle;
window.openGraph = openGraph;
window.pickSearch = pickSearch;

})();
</script>
</body>
