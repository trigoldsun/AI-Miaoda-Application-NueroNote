# NueroNote Prometheus Monitoring Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'nueronote-prod'
    region: 'cn-shanghai'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager.monitoring:9093

rule_files:
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  # Kubernetes API Server
  - job_name: 'kubernetes-apiservers'
    kubernetes_sd_configs:
      - role: endpoints
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https

  # Kubernetes Nodes
  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  # Kubernetes Pods
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __param_target_port
        regex: (.+)
        replacement: $1
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
        replacement: $1
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod

  # NueroNote Backend
  - job_name: 'nueronote-backend'
    kubernetes_sd_configs:
      - role: service
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app, __meta_kubernetes_service_label_component]
        action: keep
        regex: nueronote;backend
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_port]
        action: replace
        target_label: __param_target_port
        regex: (.+)
        replacement: $1
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
        replacement: $1
      - action: labelmap
        regex: __meta_kubernetes_service_label_(.+)

  # NueroNote Frontend
  - job_name: 'nueronote-frontend'
    kubernetes_sd_configs:
      - role: service
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app, __meta_kubernetes_service_label_component]
        action: keep
        regex: nueronote;frontend

  # Nginx Ingress
  - job_name: 'kubernetes-ingresses'
    kubernetes_sd_configs:
      - role: ingress
    relabel_configs:
      - source_labels: [__meta_kubernetes_ingress_annotation_prometheus_io_scrape]
        action: keep
        regex: true

---

# Prometheus Alert Rules
groups:
  - name: nueronote-alerts
    interval: 30s
    rules:
      # API可用性
      - alert: NueroNoteAPIErrorRateHigh
        expr: |
          sum(rate(http_requests_total{service="nueronote-backend", status=~"5.."}[5m])) 
          / 
          sum(rate(http_requests_total{service="nueronote-backend"}[5m])) > 0.01
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "NueroNote API错误率超过1%"
          description: "当前5xx错误率: {{ $value | humanizePercentage }}"
          
      # API延迟
      - alert: NueroNoteAPILatencyHigh
        expr: |
          histogram_quantile(0.99, 
            sum(rate(http_request_duration_seconds_bucket{service="nueronote-backend"}[5m])) by (le)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "NueroNote API P99延迟超过500ms"
          description: "当前P99延迟: {{ $value }}s"
          
      # Pod健康
      - alert: NueroNoteBackendPodNotReady
        expr: |
          sum(kube_pod_status_phase{namespace="nueronote-prod", pod=~"nueronote-backend-.*", phase!="Running"}) by (pod) > 0
        for: 2m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "Backend Pod not ready"
          
      - alert: NueroNoteBackendPodRestarting
        expr: |
          rate(kube_pod_container_status_restarts_total{namespace="nueronote-prod", pod=~"nueronote-backend-.*"}[15m]) > 0.01
        for: 5m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "Backend Pod重启过于频繁"
          
      # HPA状态
      - alert: NueroNoteHPAAtMaxReplicas
        expr: |
          kube_horizontalpodautoscaler_status_current_replicas{namespace="nueronote-prod", hpa=~"nueronote.*"} 
          >= 
          kube_horizontalpodautoscaler_spec_max_replicas{namespace="nueronote-prod", hpa=~"nueronote.*"}
        for: 10m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "HPA已达到最大副本数"
          description: "{{ $labels.hpa }} 当前副本数: {{ $value }}"
          
      # 数据库连接
      - alert: NueroNoteDatabaseConnectionsHigh
        expr: |
          (sum(pg_stat_activity_count) / sum(pg_settings_max_connections)) > 0.8
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "数据库连接数超过80%"
          
      # Redis内存
      - alert: NueroNoteRedisMemoryHigh
        expr: |
          (redis_memory_used_bytes / redis_memory_max_bytes) > 0.8
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Redis内存使用超过80%"

  - name: kubernetes-alerts
    interval: 30s
    rules:
      - alert: KubernetesNodeCPUUsageHigh
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Node CPU使用率超过85%"
          
      - alert: KubernetesNodeMemoryUsageHigh
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Node内存使用率超过90%"
          
      - alert: KubernetesPodNotReady
        expr: |
          sum by (namespace, pod) (kube_pod_status_ready{namespace=~"nueronote.*"}) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod not ready"
