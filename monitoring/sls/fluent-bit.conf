[SERVICE]
    Flush         5
    Log_Level     info
    Daemon        off
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    Health_Check  On

[INPUT]
    Name              tail
    Path              /var/log/containers/*.log
    Parser            docker
    Tag               kube.*
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    DB                /var/log/flb_kube.db

[INPUT]
    Name              tail
    Path              /var/log/nginx/*.log
    Parser            nginx
    Tag               nginx.*
    Refresh_Interval  5

[FILTER]
    Name                kubernetes
    Match               kube.*
    Kube_URL            https://kubernetes.default.svc:443
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_Tag_Prefix     kube.var.log.containers.
    Merge_Log           On
    Merge_Log_Key       log_processed
    K8S-Logging.Parser On
    K8S-Logging.Exclude On
    Labels              On
    Annotations         Off

[FILTER]
    Name          modify
    Match         kube.*
    Add           cluster nueronote-prod
    Add           region cn-shanghai

[FILTER]
    Name         lua
    Match        kube.*
    Script       lua-filter.lua
    Call         add_trace_id

[OUTPUT]
    Name                  aliyunlogs
    Match                 kube.*
    Host                  ${ALS_ENDPOINT}
    Port                  443
    Project               nueronote-prod
    Logstore              app-logs
    Access_Key_Id         ${ALS_AK_ID}
    Access_Key_Secret     ${ALS_AK_SECRET}
    SLS_Send_URL          https://${ALS_ENDPOINT}/logstores/app-logs
    http_protocol         https
    net.keepalive         on
    net.keepalive_idle_time  30
    Buffer_Size           10MB
    Retry_Limit           3

[OUTPUT]
    Name                  aliyunlogs
    Match                 nginx.*
    Host                  ${ALS_ENDPOINT}
    Port                  443
    Project               nueronote-prod
    Logstore              access-logs
    Access_Key_Id         ${ALS_AK_ID}
    Access_Key_Secret     ${ALS_AK_SECRET}
    SLS_Send_URL          https://${ALS_ENDPOINT}/logstores/access-logs
    http_protocol         https
    net.keepalive         on
    net.keepalive_idle_time  30
    Buffer_Size           10MB
    Retry_Limit           3

[OUTPUT]
    Name                  stdout
    Match                 *
    Format                json_lines
