# NueroNote Production Overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nueronote-prod

commonLabels:
  environment: production

resources:
  - ../../base/namespace.yaml

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 5
    target:
      kind: Deployment
      name: nueronote-backend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: nueronote-frontend

configMapGenerator:
  - name: nueronote-config
    behavior: merge
    literals:
      - APP_ENV=production
      - LOG_LEVEL=warn

images:
  - name: python
    newName: registry.cn-shanghai.aliyuncs.com/nueronote/backend
    newTag: latest
  - name: nginx
    newName: registry.cn-shanghai.aliyuncs.com/nueronote/frontend
    newTag: latest
