# NueroNote Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nueronote-frontend
  labels:
    app: nueronote
    component: frontend
    language: javascript
    type: static
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nueronote
      component: frontend
  template:
    metadata:
      labels:
        app: nueronote
        component: frontend
        language: javascript
        type: static
      annotations:
        prometheus.io/scrape: "false"
    spec:
      containers:
        - name: frontend
          image: registry.cn-shanghai.aliyuncs.com/nueronote/frontend:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
