# NueroNote Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nueronote-backend
  labels:
    app: nueronote
    component: backend
    language: python
    framework: flask
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nueronote
      component: backend
  template:
    metadata:
      labels:
        app: nueronote
        component: backend
        language: python
        framework: flask
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: nueronote-sa
      containers:
        - name: backend
          image: registry.cn-shanghai.aliyuncs.com/nueronote/backend:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: FLASK_ENV
              value: "production"
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nueronote-secret
                  key: flask-secret-key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nueronote-secret
                  key: jwt-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
