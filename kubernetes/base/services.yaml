# NueroNote Services
apiVersion: v1
kind: Service
metadata:
  name: nueronote-backend
  labels:
    app: nueronote
    component: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app: nueronote
    component: backend
---
apiVersion: v1
kind: Service
metadata:
  name: nueronote-frontend
  labels:
    app: nueronote
    component: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: nueronote
    component: frontend
