# NueroNote RBAC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nueronote-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nueronote-role
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nueronote-rolebinding
subjects:
  - kind: ServiceAccount
    name: nueronote-sa
    namespace: nueronote
roleRef:
  kind: Role
  name: nueronote-role
  apiGroup: rbac.authorization.k8s.io
