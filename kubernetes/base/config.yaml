# NueroNote ConfigMap and Secret
apiVersion: v1
kind: ConfigMap
metadata:
  name: nueronote-config
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  DB_HOST: "nueronote-db.internal"
  DB_PORT: "5432"
  DB_NAME: "nueronote"
  REDIS_HOST: "nueronote-cache.internal"
  REDIS_PORT: "6379"
  CORS_ORIGINS: "https://app.nueronote.com"
  RATE_LIMIT_PER_MINUTE: "100"
---
apiVersion: v1
kind: Secret
metadata:
  name: nueronote-secret
type: Opaque
stringData:
  flask-secret-key: "REPLACE_WITH_REAL_SECRET"
  jwt-secret: "REPLACE_WITH_REAL_JWT_SECRET"
  db-username: "nueronote"
  db-password: "REPLACE_WITH_REAL_DB_PASSWORD"
