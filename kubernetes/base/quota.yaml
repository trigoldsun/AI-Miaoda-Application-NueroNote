# NueroNote Resource Quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: nueronote-quota
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "20"
    services: "10"
---
# NueroNote Limit Range
apiVersion: v1
kind: LimitRange
metadata:
  name: nueronote-limit
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: 50m
        memory: 64Mi
