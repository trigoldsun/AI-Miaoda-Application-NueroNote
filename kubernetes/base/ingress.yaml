# NueroNote Ingress (Alibaba Cloud SLB)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nueronote-ingress
  annotations:
    kubernetes.io/ingress.class: slb
    alibabacloud.com/forward-port: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  rules:
    - host: api.nueronote.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nueronote-backend
                port:
                  name: http
    - host: app.nueronote.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nueronote-frontend
                port:
                  name: http
